name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  security:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Run Gitleaks
      run: |
        docker run --rm \
        -v ${{ github.workspace }}:/path \
        zricethezav/gitleaks:latest \
        detect --no-git --source="/path"

    - name: Run Semgrep
      run: |
        pip install semgrep
        semgrep --config auto .

    - name: Run Trivy FS Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'

    - name: Run Checkov
      run: |
        pip install checkov
        checkov -d .

  build:
    needs: security

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest
